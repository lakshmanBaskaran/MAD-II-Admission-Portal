{% extends "layout.html" %}

{% block content %}

<div id="app">

<h3>Company Registrations</h3>

<table class="table table-bordered mt-4">

<tr>
<th>ID</th>
<th>Company Name</th>
<th>Status</th>
<th>Action</th>
</tr>

<tr v-for="company in companies" :key="company.id">

<td>[[ company.id ]]</td>
<td>[[ company.company_name ]]</td>

<td>
<span v-if="company.approved">Approved</span>
<span v-else>Pending</span>
</td>

<td>

<a v-if="!company.approved"
:href="'/admin/approve_company/' + company.id"
class="btn btn-success btn-sm">

Approve

</a>

</td>

</tr>

</table>

<a href="/admin/dashboard" class="btn btn-secondary">Back</a>

</div>

<script>

const { createApp } = Vue

createApp({

delimiters: ['[[', ']]'],

data() {
return {
companies: {{ companies | tojson }}
}
}

}).mount("#app")

</script>

{% endblock %}
