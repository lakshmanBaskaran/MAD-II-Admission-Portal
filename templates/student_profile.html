{% extends "layout.html" %}

{% block content %}

<h3>Student Profile</h3>

<form method="POST" action="/student/update_profile">

<div class="mb-3">
<label>Phone</label>
<input type="text" name="phone" class="form-control"
value="{{ student.phone }}">
</div>

<div class="mb-3">
<label>Course</label>
<input type="text" name="course" class="form-control"
value="{{ student.course }}">
</div>

<div class="mb-3">
<label>Graduation Year</label>
<input type="number" name="graduation_year"
class="form-control"
value="{{ student.graduation_year }}">
</div>

<button class="btn btn-primary">Update Profile</button>

</form>

<hr>

<h5>Upload Resume</h5>

<form method="POST" action="/student/upload_resume"
enctype="multipart/form-data">

<input type="file" name="resume" class="form-control">

<button class="btn btn-success mt-2">Upload Resume</button>

</form>

{% if student.resume_filename %}

<p class="mt-3">
Current Resume:
<a href="/student/download_resume/{{ student.id }}">
Download {{ student.resume_filename }}
</a>
</p>

{% endif %}

<a href="/student/dashboard" class="btn btn-secondary mt-3">
Back
</a>

{% endblock %}
